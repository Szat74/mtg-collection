services:
  mtg-backend:
    image: ghcr.io/szat74/mtg-collection-backend:latest
    container_name: mtg-backend
    restart: unless-stopped
    environment:
      # FIX: explicitly set PORT so server.js binds to 3001,
      # matching the healthcheck and nginx proxy target.
      PORT: 3001
    volumes:
      - CHANGE_TO_YOUR_COMPOSE_PATH:/data
    networks:
      - mtg-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/stats"]
      interval: 30s
      timeout: 5s
      retries: 3

  mtg-frontend:
    image: ghcr.io/szat74/mtg-collection-frontend:latest
    container_name: mtg-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      # FIX: was "backend" — must match the service name above ("mtg-backend")
      mtg-backend:
        condition: service_healthy
    networks:
      - mtg-net

networks:
  mtg-net:
    driver: bridge
