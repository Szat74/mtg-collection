# ── Drop this file into OMV's Docker Compose manager ─────────────────────────
# Pulls pre-built images from GitHub Container Registry.
# No build step needed on your NAS.
#
# Before deploying:
#   1. Replace YOUR_GITHUB_USERNAME (lowercase) with your GitHub username
#   2. Create the data dir on your NAS:  sudo mkdir -p /srv/mtg-collection/data
#   3. Make the packages public on ghcr.io (or add pull credentials — see README)

version: '3.9'

services:
  mtg-backend:
    image: ghcr.io/YOUR_GITHUB_USERNAME/mtg-collection-backend:latest
    container_name: mtg-backend
    restart: unless-stopped
    volumes:
      - /srv/mtg-collection/data:/data
    networks:
      - mtg-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/stats"]
      interval: 30s
      timeout: 5s
      retries: 3

  mtg-frontend:
    image: ghcr.io/YOUR_GITHUB_USERNAME/mtg-collection-frontend:latest
    container_name: mtg-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mtg-net

networks:
  mtg-net:
    driver: bridge
