server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # FIX: proxy to the backend container via Docker network name, not localhost.
    # "mtg-backend" matches the container_name in docker-compose / omv-compose.
    location /api/ {
        proxy_pass         http://mtg-backend:3001/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
