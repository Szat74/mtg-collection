services:
  mtg-database:
    build: ./backend
    container_name: mtg-database
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      NODE_OPTIONS: "--use-openssl-ca"
      PORT: "3001"
      DB_PATH: "/data/collection.db"
      SCRYFALL_CONTACT_EMAIL: "frankie@szat.com"
    networks:
      mtg-net:
        # FIX: nginx.conf is built with "mtg-backend" as the upstream hostname.
        # This alias lets the frontend resolve that name regardless of
        # what you name the container.
        aliases:
          - mtg-backend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/cache/status').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mtg-web:
    build: ./frontend
    container_name: mtg-web
    restart: unless-stopped
    ports:
      - "8085:80"
    depends_on:
      mtg-database:
        condition: service_healthy
    networks:
      - mtg-net

networks:
  mtg-net:
    driver: bridge
