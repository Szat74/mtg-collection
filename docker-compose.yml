services:
  backend:
    image: ghcr.io/szat74/mtg-collection-backend:latest
    container_name: mtg-backend
    restart: unless-stopped
    environment:
      # FIX: explicitly set PORT so server.js binds to 3001,
      # matching the healthcheck and nginx proxy target.
      PORT: 3001
    volumes:
      - mtg-data:/data          # SQLite database
    networks:
      - mtg-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/stats"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/szat74/mtg-collection-frontend:latest
    container_name: mtg-frontend
    restart: unless-stopped
    ports:
      - "8080:80"               # Change left side to use a different host port
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mtg-net

volumes:
  mtg-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/mtg-collection/data   # OMV path — adjust if needed

networks:
  mtg-net:
    driver: bridge
